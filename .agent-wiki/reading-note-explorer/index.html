<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reading Note Explorer</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <p class="eyebrow">Garden</p>
          <h1>Reading Note Explorer</h1>
          <p class="sidebar-copy">`🎁Topic/...` ごとに読みながら、近い note をたどるためのビュー。</p>
        </div>
        <label class="search">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="タイトルや本文で絞る">
        </label>
        <div class="topic-list" id="topic-list"></div>
      </aside>

      <main class="main">
        <section class="column note-list-column">
          <div class="column-header">
            <div>
              <p class="eyebrow">Topic Cluster</p>
              <h2 id="topic-title">Loading...</h2>
            </div>
            <p class="meta" id="topic-meta"></p>
          </div>
          <div class="note-list" id="note-list"></div>
        </section>

        <section class="column detail-column">
          <div class="detail" id="detail"></div>
        </section>
      </main>
    </div>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
  </html>
